apiVersion: agentspec.io/v1
kind: AgentSpec

metadata:
  name: gymcoach
  version: 1.0.0
  description: "AI fitness coach — creates personalised workout plans, tracks training sessions, and delivers nutrition guidance"
  tags: [fitness, coaching, health]
  author: "AgentBoot"
  license: MIT

spec:
  # ── MODEL ──────────────────────────────────────────────────────────────────
  model:
    provider: groq
    id: llama-3.3-70b-versatile
    apiKey: $env:GROQ_API_KEY
    parameters:
      temperature: 0.3
      maxTokens: 500
    fallback:
      provider: azure
      id: gpt-4
      apiKey: $env:AZURE_OPENAI_API_KEY
      triggerOn: [rate_limit, timeout, error_5xx]
      maxRetries: 2
    costControls:
      maxMonthlyUSD: 200
      alertAtUSD: 150

  # ── PROMPTS ────────────────────────────────────────────────────────────────
  prompts:
    system: $file:prompts/system_prompt.txt
    fallback: "I'm experiencing difficulties connecting to my systems. Please try again in a moment."
    hotReload: true
    variables:
      - name: unit_system
        value: $env:UNIT_SYSTEM
      - name: current_date
        value: "$func:now_iso"

  # ── TOOLS ──────────────────────────────────────────────────────────────────
  tools:
    - name: log-workout
      type: function
      description: "Log a completed training session with exercises, sets, reps, and duration"
      module: $file:tools/tool_implementations.py
      function: log_workout
      annotations:
        readOnlyHint: false
        destructiveHint: false
        idempotentHint: false

    - name: get-workout-history
      type: function
      description: "Retrieve past training sessions with optional filters by date or muscle group"
      module: $file:tools/tool_implementations.py
      function: get_workout_history
      annotations:
        readOnlyHint: true
        idempotentHint: true

    - name: create-workout-plan
      type: function
      description: "Generate a personalised workout plan based on goals, fitness level, and schedule"
      module: $file:tools/tool_implementations.py
      function: create_workout_plan
      annotations:
        readOnlyHint: false
        destructiveHint: false
        idempotentHint: false

    - name: get-progress-summary
      type: function
      description: "Get training progress summary for a time period, grouped by muscle group or metric"
      module: $file:tools/tool_implementations.py
      function: get_progress_summary
      annotations:
        readOnlyHint: true
        idempotentHint: true

    - name: update-goals
      type: function
      description: "Create or update a fitness goal (weight, strength, endurance)"
      module: $file:tools/tool_implementations.py
      function: update_goals
      annotations:
        readOnlyHint: false
        destructiveHint: false

    - name: delete-workout
      type: function
      description: "Delete a logged training session"
      module: $file:tools/tool_implementations.py
      function: delete_workout
      annotations:
        readOnlyHint: false
        destructiveHint: true

    - name: get-exercises
      type: function
      description: "List exercises filtered by muscle group, equipment, or difficulty"
      module: $file:tools/tool_implementations.py
      function: get_exercises
      annotations:
        readOnlyHint: true
        idempotentHint: true

    - name: schedule-session
      type: function
      description: "Schedule an upcoming training session in the user's calendar"
      module: $file:tools/tool_implementations.py
      function: schedule_session
      annotations:
        readOnlyHint: false
        destructiveHint: false

    - name: get-nutrition-tips
      type: function
      description: "Retrieve nutrition guidance tailored to the user's current goal and training load"
      module: $file:tools/tool_implementations.py
      function: get_nutrition_tips
      annotations:
        readOnlyHint: true
        idempotentHint: true

    - name: search-exercises
      type: function
      description: "Search exercises by keyword, body part, or available equipment"
      module: $file:tools/tool_implementations.py
      function: search_exercises
      annotations:
        readOnlyHint: true
        idempotentHint: false

  # ── MCP SERVERS ────────────────────────────────────────────────────────────
  mcp:
    servers:
      - name: postgres-db
        transport: stdio
        command: npx
        args: [-y, "@modelcontextprotocol/server-postgres"]
        env:
          DATABASE_URL: $env:DATABASE_URL
        healthCheck:
          timeoutSeconds: 5

  # ── MEMORY ─────────────────────────────────────────────────────────────────
  memory:
    shortTerm:
      backend: redis
      maxTurns: 20
      maxTokens: 8000
      ttlSeconds: 3600
      connection: $env:REDIS_URL

    longTerm:
      backend: postgres
      connectionString: $env:DATABASE_URL
      table: agent_sessions
      ttlDays: 90

    hygiene:
      piiScrubFields: [name, email, date_of_birth, medical_conditions, injury_history]
      auditLog: true

  # ── SUB-AGENTS ─────────────────────────────────────────────────────────────
  subagents:
    - name: observer
      ref:
        agentspec: ./agents/observer.yaml
      invocation: parallel
      passContext: true

    - name: reflector
      ref:
        agentspec: ./agents/reflector.yaml
      invocation: sequential
      passContext: true

  # ── API ────────────────────────────────────────────────────────────────────
  api:
    type: rest
    port: 8000
    pathPrefix: /api/v1
    auth:
      type: jwt
      jwksUri: $env:JWKS_URI
    rateLimit:
      requestsPerMinute: 60
    streaming: true
    healthEndpoint: /health
    metricsEndpoint: /metrics

  # ── GUARDRAILS ─────────────────────────────────────────────────────────────
  guardrails:
    input:
      - type: topic-filter
        blockedTopics: [illegal_activity, self_harm, violence, explicit_content]
        action: reject
        message: "I can only help with fitness and training topics. Please ask about workouts, nutrition, or exercise planning."
      - type: pii-detector
        action: scrub
        fields: [date_of_birth, medical_conditions, injury_history]
      - type: prompt-injection
        action: reject
        sensitivity: high

    output:
      - type: hallucination-detector
        threshold: 0.8
        action: retry
        maxRetries: 2
      - type: toxicity-filter
        threshold: 0.7
        action: reject
      - type: pii-detector
        action: scrub
        fields: [date_of_birth, medical_conditions]

  # ── EVALUATION ─────────────────────────────────────────────────────────────
  evaluation:
    framework: deepeval
    datasets:
      - name: workout-qa
        path: $file:eval/workout-qa.jsonl
      - name: exercise-advice
        path: $file:eval/exercise-advice.jsonl
    metrics:
      - faithfulness
      - answer_relevancy
      - hallucination
      - toxicity
    thresholds:
      faithfulness: 0.85
      hallucination: 0.05
      toxicity: 0.1
    ciGate: true

  # ── OBSERVABILITY ──────────────────────────────────────────────────────────
  observability:
    tracing:
      backend: langfuse
      endpoint: $env:LANGFUSE_HOST
      publicKey: $env:LANGFUSE_PUBLIC_KEY
      secretKey: $secret:langfuse-secret-key
      sampleRate: 1.0
    metrics:
      backend: opentelemetry
      endpoint: $env:OTEL_EXPORTER_OTLP_ENDPOINT
      serviceName: gymcoach
    logging:
      level: info
      structured: true
      redactFields: [api_key, password, medical_conditions]

  # ── COMPLIANCE ─────────────────────────────────────────────────────────────
  compliance:
    packs:
      - owasp-llm-top10
      - memory-hygiene
      - model-resilience
      - evaluation-coverage
    auditSchedule: weekly

  # ── RUNTIME REQUIREMENTS ───────────────────────────────────────────────────
  requires:
    envVars:
      - GROQ_API_KEY
      - DATABASE_URL
      - REDIS_URL
      - LANGFUSE_HOST
      - LANGFUSE_PUBLIC_KEY
      - UNIT_SYSTEM
    services:
      - type: postgres
        connection: $env:DATABASE_URL
      - type: redis
        connection: $env:REDIS_URL
    minimumMemoryMB: 512
