name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

# Minimal permissions — CI only needs to read code
permissions:
  contents: read

# Cancel in-progress runs for the same branch/PR when a new push arrives
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Lint + Typecheck ─────────────────────────────────────────────────────────
  lint:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Build SDK first — CLI and adapter depend on @agentspec/sdk dist types
      - run: pnpm build

      - run: pnpm lint

      - run: pnpm typecheck

  # ── Build ────────────────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      - uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: packages/*/dist
          retention-days: 1

  # ── Test ─────────────────────────────────────────────────────────────────────
  test:
    name: Test (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 10

    strategy:
      fail-fast: false
      matrix:
        node-version: [20.x, 22.x]

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      - run: pnpm test

  # ── Sidecar E2E (Docker Compose) ─────────────────────────────────────────────
  sidecar-e2e:
    name: Sidecar E2E
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Run sidecar E2E (Docker Compose)
        run: pnpm --filter @agentspec/sidecar test:e2e

  # ── Docker dry-run (no push) ──────────────────────────────────────────────────
  docker-validate:
    name: Docker build ${{ matrix.name }}
    runs-on: ubuntu-latest
    needs: [build, test]
    timeout-minutes: 20

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: sidecar
            file: packages/sidecar/Dockerfile
            context: .
          - name: operator
            file: packages/operator/Dockerfile
            context: packages/operator
          - name: control-plane
            file: packages/control-plane/Dockerfile
            context: packages/control-plane

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          push: false
          load: true
          tags: agentspec-${{ matrix.name }}:ci

  # ── Gate — all jobs must pass ─────────────────────────────────────────────────
  ci-success:
    name: CI
    runs-on: ubuntu-latest
    needs: [lint, build, test, docker-validate, sidecar-e2e]
    if: always()

    steps:
      - name: Check all jobs passed
        run: |
          if [[ "${{ needs.lint.result }}" != "success" ]]; then
            echo "Lint job failed" && exit 1
          fi
          if [[ "${{ needs.build.result }}" != "success" ]]; then
            echo "Build job failed" && exit 1
          fi
          if [[ "${{ needs.test.result }}" != "success" ]]; then
            echo "Test job failed" && exit 1
          fi
          if [[ "${{ needs.docker-validate.result }}" != "success" ]]; then
            echo "Docker validate job failed" && exit 1
          fi
          if [[ "${{ needs.sidecar-e2e.result }}" != "success" ]]; then
            echo "Sidecar E2E job failed" && exit 1
          fi
          echo "All CI jobs passed."
