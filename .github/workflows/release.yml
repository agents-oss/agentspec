name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump type'
        required: true
        type: choice
        options: [patch, minor, major]

permissions:
  contents: write

jobs:
  release:
    name: Bump version, tag, and create release
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      version: ${{ steps.semver.outputs.new }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Calculate new version
        id: semver
        run: |
          CURRENT=$(node -p "require('./packages/sdk/package.json').version")
          MAJOR=$(echo "$CURRENT" | cut -d. -f1)
          MINOR=$(echo "$CURRENT" | cut -d. -f2)
          PATCH=$(echo "$CURRENT" | cut -d. -f3)

          case "${{ inputs.bump }}" in
            major) NEW_VER="$((MAJOR + 1)).0.0" ;;
            minor) NEW_VER="${MAJOR}.$((MINOR + 1)).0" ;;
            patch) NEW_VER="${MAJOR}.${MINOR}.$((PATCH + 1))" ;;
          esac

          echo "current=$CURRENT" >> $GITHUB_OUTPUT
          echo "new=$NEW_VER" >> $GITHUB_OUTPUT
          echo "Bumping $CURRENT → $NEW_VER (${{ inputs.bump }})"

      - name: Update package versions
        run: |
          NEW_VER="${{ steps.semver.outputs.new }}"
          for pkg in packages/sdk packages/adapter-claude packages/cli; do
            (cd "$pkg" && npm version "$NEW_VER" --no-git-tag-version)
          done

      - name: Update Helm Chart.yaml
        run: |
          NEW_VER="${{ steps.semver.outputs.new }}"
          CHART="packages/operator/helm/agentspec-operator/Chart.yaml"
          sed -i "s/^version:.*/version: $NEW_VER/" "$CHART"
          sed -i "s/^appVersion:.*/appVersion: \"$NEW_VER\"/" "$CHART"

      - name: Commit, tag, and push
        run: |
          NEW_VER="${{ steps.semver.outputs.new }}"
          git add packages/sdk/package.json \
                  packages/adapter-claude/package.json \
                  packages/cli/package.json \
                  packages/operator/helm/agentspec-operator/Chart.yaml
          git commit -m "chore: release v${NEW_VER}"
          git tag "v${NEW_VER}"
          git push origin main --tags

      - name: Create GitHub Release
        run: |
          NEW_VER="${{ steps.semver.outputs.new }}"
          {
            echo "## Install"
            echo ""
            echo '```bash'
            echo "curl -fsSL https://raw.githubusercontent.com/agents-oss/agentspec/main/install.sh | bash"
            echo '```'
            echo ""
            echo "## Helm"
            echo ""
            echo '```bash'
            echo "helm install agentspec-operator oci://ghcr.io/agents-oss/charts/agentspec-operator --version ${NEW_VER}"
            echo '```'
            echo ""
            echo "## npm"
            echo ""
            echo '```bash'
            echo "npm install @agentspec/sdk@${NEW_VER}"
            echo "npm install @agentspec/adapter-claude@${NEW_VER}"
            echo "npm install -g @agentspec/cli@${NEW_VER}"
            echo '```'
          } > /tmp/release-notes.md
          gh release create "v${NEW_VER}" \
            --title "AgentSpec v${NEW_VER}" \
            --generate-notes \
            --notes-file /tmp/release-notes.md
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  docker:
    name: Build & push Docker images
    needs: release
    uses: ./.github/workflows/build-docker.yml
    with:
      version: ${{ needs.release.outputs.version }}
    permissions:
      packages: write
      contents: read

  helm:
    name: Publish Helm chart
    needs: release
    uses: ./.github/workflows/publish-helm.yml
    with:
      version: ${{ needs.release.outputs.version }}
    permissions:
      packages: write
      contents: read

  npm:
    name: Publish npm packages
    needs: release
    uses: ./.github/workflows/publish.yml
    with:
      version: ${{ needs.release.outputs.version }}
    secrets:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
    permissions:
      contents: write
      id-token: write
