name: Publish to npm

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g., 0.1.0)'
        required: true
        type: string
  workflow_call:
    inputs:
      version:
        required: true
        type: string

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      - run: pnpm test

      - name: Extract version
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" || "${{ github.event_name }}" == "workflow_call" ]]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION="${GITHUB_REF#refs/tags/v}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Publishing version: $VERSION"

      # pnpm replaces workspace:* with the real version before publishing.
      # NODE_AUTH_TOKEN must not be set — npm uses OIDC Trusted Publishing automatically.
      - name: Publish @agentspec/sdk
        working-directory: packages/sdk
        run: pnpm publish --no-git-checks --access public --provenance

      - name: Publish @agentspec/adapter-claude
        working-directory: packages/adapter-claude
        run: pnpm publish --no-git-checks --access public --provenance

      - name: Publish @agentspec/cli
        working-directory: packages/cli
        run: pnpm publish --no-git-checks --access public --provenance

      - name: Job summary
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          echo "## Published to npm" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** ${VERSION}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- \`@agentspec/sdk@${VERSION}\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`@agentspec/adapter-claude@${VERSION}\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`@agentspec/cli@${VERSION}\`" >> $GITHUB_STEP_SUMMARY
