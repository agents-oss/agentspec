name: Publish to npm

# Uses npm Trusted Publishing (OIDC provenance) — no NPM_TOKEN required.
# Authentication happens automatically via GitHub OIDC.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g., 0.1.0)'
        required: true
        type: string
  workflow_call:
    inputs:
      version:
        required: true
        type: string

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'

      - name: Upgrade npm (required for OIDC Trusted Publishing)
        run: npm install -g npm@latest

      - name: Verify npm version
        run: |
          npm --version
          echo "npm >=9.5 required for OIDC Trusted Publishing"

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      - run: pnpm test

      - name: Extract version
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" || "${{ github.event_name }}" == "workflow_call" ]]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION="${GITHUB_REF#refs/tags/v}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Publishing version: $VERSION"

      # pnpm pack resolves workspace:* to real versions before npm publishes.
      - name: Publish @agentspec/sdk
        run: |
          cd packages/sdk
          pnpm pack
          npm publish agentspec-sdk-*.tgz --access public --provenance

      - name: Publish @agentspec/adapter-claude
        run: |
          cd packages/adapter-claude
          pnpm pack
          npm publish agentspec-adapter-claude-*.tgz --access public --provenance

      - name: Publish @agentspec/cli
        run: |
          cd packages/cli
          pnpm pack
          npm publish agentspec-cli-*.tgz --access public --provenance

      - name: Job summary
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          echo "## Published to npm" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** ${VERSION}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- \`@agentspec/sdk@${VERSION}\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`@agentspec/adapter-claude@${VERSION}\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`@agentspec/cli@${VERSION}\`" >> $GITHUB_STEP_SUMMARY
