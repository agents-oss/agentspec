{{- if .Values.rbac.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "agentspec-operator.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "agentspec-operator.labels" . | nindent 4 }}
# Disabled at SA level — only the operator pod opts in (set in deployment.yaml).
# This prevents the token being auto-mounted into any other pod that happens to
# use this service account (e.g. a debug pod created with --serviceaccount).
automountServiceAccountToken: false
{{- end }}
