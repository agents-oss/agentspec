{{- if .Values.webhook.enabled }}
---
# Service that fronts the webhook server in the operator pod (port 9443).
# kube-apiserver sends AdmissionReview requests here.
apiVersion: v1
kind: Service
metadata:
  name: {{ include "agentspec-operator.name" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "agentspec-operator.labels" . | nindent 4 }}
spec:
  selector:
    {{- include "agentspec-operator.selectorLabels" . | nindent 4 }}
  ports:
    - name: webhook
      port: 443
      targetPort: 9443
      protocol: TCP
---
# MutatingWebhookConfiguration — intercepts Pod CREATE when the inject
# annotation is present.  failurePolicy: Ignore ensures the webhook can
# never block pod scheduling even if the webhook server is down.
apiVersion: admissionregistration.k8s.io/v1
kind: MutatingWebhookConfiguration
metadata:
  name: {{ include "agentspec-operator.name" . }}-inject
  labels:
    {{- include "agentspec-operator.labels" . | nindent 4 }}
  {{- if .Values.webhook.certManager.enabled }}
  annotations:
    # cert-manager injects the caBundle automatically when this annotation
    # references the Certificate resource (namespace/name).
    cert-manager.io/inject-ca-from: {{ .Release.Namespace }}/{{ include "agentspec-operator.name" . }}-webhook-cert
  {{- end }}
webhooks:
  - name: inject.agentspec.io
    admissionReviewVersions: ["v1"]
    sideEffects: NoneOnDryRun
    failurePolicy: Ignore
    timeoutSeconds: 10
    # Only intercept Pod CREATE (not UPDATE — re-injection on update is risky).
    rules:
      - apiGroups: [""]
        apiVersions: ["v1"]
        operations: ["CREATE"]
        resources: ["pods"]
        scope: Namespaced
    # objectSelector — pre-filters pods before the webhook is called.
    # In annotation mode, only call the webhook for pods with the opt-in annotation,
    # reducing noise and latency for non-agentspec workloads.
    # In default mode, the webhook is called for all pods (handler decides per-pod).
    objectSelector:
      {{- if eq .Values.webhook.injectMode "annotation" }}
      matchExpressions:
        - key: agentspec.io/inject
          operator: In
          values: ["true"]
      {{- else }}
      matchLabels: {}
      {{- end }}
    # namespaceSelector — controls which namespaces kube-apiserver routes to this
    # webhook. Configured from values.yaml (webhook.namespaceSelector).
    # The operator's own namespace is always appended to the exclusion list to
    # prevent circular dependency issues.
    namespaceSelector:
      {{- $ns := .Values.webhook.namespaceSelector | deepCopy }}
      {{- if $ns.matchExpressions }}
      matchExpressions:
        {{- range $ns.matchExpressions }}
        - key: {{ .key }}
          operator: {{ .operator }}
          values:
            {{- range .values }}
            - {{ . }}
            {{- end }}
            {{- if and (eq .operator "NotIn") (eq .key "kubernetes.io/metadata.name") }}
            - {{ $.Release.Namespace }}
            {{- end }}
        {{- end }}
      {{- else if $ns.matchLabels }}
      matchLabels:
        {{- toYaml $ns.matchLabels | nindent 8 }}
      {{- end }}
    clientConfig:
      service:
        name: {{ include "agentspec-operator.name" . }}
        namespace: {{ .Release.Namespace }}
        port: 443
        path: /mutate
      {{- if not .Values.webhook.certManager.enabled }}
      # When cert-manager is disabled, supply a base64-encoded CA bundle.
      caBundle: {{ .Values.webhook.caBundle | default "" | b64enc | quote }}
      {{- end }}
{{- end }}
