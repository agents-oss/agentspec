{{- if and .Values.controlPlane.enabled .Values.controlPlane.apiKey }}
# Secret created by Helm from values.controlPlane.apiKey.
# NOTE: Storing secrets in values.yaml means they are stored in the Helm
# release history (as a Kubernetes Secret). For production workloads,
# prefer creating this Secret separately and leaving apiKey empty:
#
#   kubectl create secret generic agentspec-control-plane \
#     --namespace={{ .Release.Namespace }} \
#     --from-literal=apiKey=<your-admin-key> \
#     --from-literal=jwtSecret=<32+ char random string>
apiVersion: v1
kind: Secret
metadata:
  name: agentspec-control-plane
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "agentspec-operator.labels" . | nindent 4 }}
type: Opaque
stringData:
  apiKey: {{ .Values.controlPlane.apiKey | quote }}
  jwtSecret: {{ .Values.controlPlane.jwtSecret | default (printf "%s-jwt-secret-change-me-in-production" .Values.controlPlane.apiKey) | quote }}
{{- end }}
