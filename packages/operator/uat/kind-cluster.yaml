---
# kind cluster config for local AgentSpec operator UAT.
# Pinned to k8s v1.31.4 — stable on Docker Desktop for Mac (arm64 + amd64).
# Registry mirror removed: we use `kind load docker-image`, not a local registry.
#
# Usage:
#   kind create cluster --name agentspec --config uat/kind-cluster.yaml
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: agentspec
nodes:
  - role: control-plane
    image: kindest/node:v1.31.4
    kubeadmConfigPatches:
      - |
        kind: InitConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "ingress-ready=true"
    extraPortMappings:
      - containerPort: 30080
        hostPort: 30080
        protocol: TCP
