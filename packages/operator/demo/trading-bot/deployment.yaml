---
apiVersion: v1
kind: ConfigMap
metadata:
  name: trading-bot-agent-yaml
  namespace: demo
  labels:
    agentspec.io/agent: trading-bot
data:
  agent.yaml: |
    apiVersion: agentspec.io/v1
    kind: AgentSpec
    metadata:
      name: trading-bot
      version: "0.3.0"
      description: "Algorithmic trading signal agent — guardrails missing, model key unset"
    spec:
      model:
        provider: openai
        id: gpt-4o
        apiKey: sk-agentspec-demo   # literal (not $env:) — env check won't trigger; degraded comes from service below
      prompts:
        system: "You are an algorithmic trading assistant. Analyse market data and generate trading signals."
      tools:
        - name: get-market-data
          type: function
          description: "Fetch live market prices"
        - name: generate-signal
          type: function
          description: "Generate buy/sell signal"
        - name: execute-trade
          type: function
          description: "Place a trade order"
      # NOTE: no guardrails block — intentional compliance gap → grade D
      evaluation:
        framework: deepeval
        datasets:
          - name: trading-signals-qa
            path: eval/trading-signals-qa.jsonl   # declared but never run → +evaluated violation (low/-5) → score 55 → D
      requires:
        services:
          - type: redis
            connection: redis://redis:6379   # unreachable → warning → Degraded phase
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: trading-bot
  namespace: demo
  labels:
    agentspec.io/agent: trading-bot
spec:
  replicas: 1
  selector:
    matchLabels:
      app: trading-bot
  template:
    metadata:
      labels:
        app: trading-bot
        agentspec.io/agent: trading-bot
    spec:
      # MED-2: pod-level security context
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: trading-bot
          image: python:3.12.9-slim   # MED-1: pinned patch version, not :latest
          command: ["python", "-c", "import time; [time.sleep(60) for _ in iter(int, 1)]"]
          # OPENAI_API_KEY deliberately omitted → model check fails
          ports:
            - containerPort: 8080
              name: http
          # MED-2: container security context
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
          # MED-2: resource limits
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"

        - name: sidecar
          image: agentspec/sidecar:local   # MED-1: pinned, not :latest
          env:
            - name: UPSTREAM_URL
              value: "http://localhost:8080"
            - name: MANIFEST_PATH
              value: "/config/agent.yaml"
          ports:
            - containerPort: 4001
              name: control
          volumeMounts:
            - name: agent-manifest
              mountPath: /config
              readOnly: true
          # MED-2: container security context
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
          # MED-2: resource limits
          resources:
            requests:
              cpu: "50m"
              memory: "128Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"

      volumes:
        - name: agent-manifest
          configMap:
            name: trading-bot-agent-yaml
