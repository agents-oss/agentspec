apiVersion: v1
kind: Service
metadata:
  name: trading-bot-sidecar
  namespace: demo
  labels:
    agentspec.io/agent: trading-bot
    agentspec.io/role: sidecar
spec:
  selector:
    app: trading-bot
  ports:
    - name: control
      port: 4001
      targetPort: control
      protocol: TCP
  type: ClusterIP
