apiVersion: v1
kind: Service
metadata:
  name: voice-assistant-sidecar
  namespace: demo
  labels:
    agentspec.io/agent: voice-assistant
    agentspec.io/role: sidecar
spec:
  selector:
    app: voice-assistant
  ports:
    - name: control
      port: 4001
      targetPort: control
      protocol: TCP
  type: ClusterIP
