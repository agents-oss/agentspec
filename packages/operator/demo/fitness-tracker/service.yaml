apiVersion: v1
kind: Service
metadata:
  name: fitness-tracker-sidecar
  namespace: demo
  labels:
    agentspec.io/agent: fitness-tracker
    agentspec.io/role: sidecar
spec:
  selector:
    app: fitness-tracker
  ports:
    - name: control
      port: 4001
      targetPort: control
      protocol: TCP
  type: ClusterIP
