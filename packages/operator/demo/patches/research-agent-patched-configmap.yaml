---
# Patch 1/3 for research-agent: adds guardrails block to the agent.yaml spec.
# Effect: removes the "auditable" compliance violation (medium/-10).
# Score delta: +10 (towards 100 from original 40).
apiVersion: v1
kind: ConfigMap
metadata:
  name: research-agent-agent-yaml
  namespace: demo
  labels:
    agentspec.io/agent: research-agent
data:
  agent.yaml: |
    apiVersion: agentspec.io/v1
    kind: AgentSpec
    metadata:
      name: research-agent
      version: "0.4.0"
      description: "Research agent — guardrails added, model key being fixed, tool handlers registering"
    spec:
      model:
        provider: openai
        id: gpt-4o
        apiKey: $env:OPENAI_API_KEY
      prompts:
        system: "You are a research assistant. Search academic papers and synthesise findings."
      tools:
        - name: search-arxiv
          type: function
          description: "Search arXiv for papers matching a query"
        - name: analyze-paper
          type: function
          description: "Analyse a paper PDF and extract key findings"
      guardrails:
        input:
          - type: pii-detector
            action: scrub
            fields: [name, email]
        output:
          - type: toxicity-filter
            action: warn
            threshold: 0.7
