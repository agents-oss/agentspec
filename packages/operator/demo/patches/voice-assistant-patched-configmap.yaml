---
# Patch 1/3 for voice-assistant: adds guardrails block to the agent.yaml spec.
# Effect: removes the "auditable" compliance violation (medium/-10).
# Score delta: +10 (towards 100 from original 60).
apiVersion: v1
kind: ConfigMap
metadata:
  name: voice-assistant-agent-yaml
  namespace: demo
  labels:
    agentspec.io/agent: voice-assistant
data:
  agent.yaml: |
    apiVersion: agentspec.io/v1
    kind: AgentSpec
    metadata:
      name: voice-assistant
      version: "0.1.0"
      description: "Voice assistant — guardrails added, HTTP server starting, env key set"
    spec:
      model:
        provider: openai
        id: gpt-4o-mini
        apiKey: $env:OPENAI_API_KEY
      prompts:
        system: "You are a voice assistant. Help users with transcription, search, and calendar management."
      tools:
        - name: transcribe
          type: function
          description: "Transcribe audio to text"
        - name: synthesise
          type: function
          description: "Convert text to speech"
        - name: search
          type: function
          description: "Web search"
        - name: calendar
          type: function
          description: "Read/write calendar events"
      guardrails:
        input:
          - type: pii-detector
            action: scrub
            fields: [name, email, phone]
        output:
          - type: toxicity-filter
            action: warn
            threshold: 0.7
